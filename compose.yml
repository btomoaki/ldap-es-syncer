services:
  # 1. OpenLDAP サーバー
  ldap:
    build:
      context: .
      dockerfile: build/ldap/Dockerfile
      args:
        - LDAP_VERSION=${LDAP_VERSION}
    image: ldap-server-bcrypt:latest
    container_name: ldap-server
    environment:
      - LDAP_ROOT=${LDAP_BASE_DN}
      - LDAP_ADMIN_PASSWORD=${LDAP_PASSWORD}
      - LDAP_SKIP_DEFAULT_TREE=yes
      - BITNAMI_DEBUG=true
    ports:
      - "389:1389"
      - "636:1636"
    volumes:
      - ldap_data:/bitnami/openldap
      - ./test/ldap/00_setup_bcrypt.sh:/docker-entrypoint-initdb.d/00_setup_bcrypt.sh:ro
      - ./test/ldap/bootstrap.ldif:/custom/bootstrap.ldif:ro
    networks:
      - syncer-net

  # phpLDAPadmin (LDAP管理用WebUI)
  phpldapadmin:
    image: osixia/phpldapadmin:${PHPLDAPADMIN_VERSION}
    container_name: phpldapadmin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=${PHPLDAPADMIN_LDAP_HOSTS}
      - PHPLDAPADMIN_HTTPS=${PHPLDAPADMIN_HTTPS}
    ports:
      - "8080:80"
    depends_on:
      - ldap
    networks:
      - syncer-net

  # 2. Elasticsearch サーバー
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # ELASTIC_PASSWORD (Elastic stack official docker guidelines)
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      # ローカル開発のためにセキュリティを有効化（SSLは無効のままでパスワード認証を有効にする）
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - syncer-net

  # Kibana (Elasticsearch管理用WebUI)
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS}
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - syncer-net

  # 3. Prometheus & Pushgateway & Grafana for Monitoring
  pushgateway:
    image: prom/pushgateway:${PUSHGATEWAY_VERSION}
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - syncer-net

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./test/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./test/monitoring/prometheus/${ALERT_RULES_FILE:-alert.rules}:/etc/prometheus/alert.rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - pushgateway
    networks:
      - syncer-net

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./test/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./test/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - syncer-net

volumes:
  ldap_data:
  ldap_config:
  es_data:
  prometheus_data:
  grafana_data:

networks:
  syncer-net:
    driver: bridge
